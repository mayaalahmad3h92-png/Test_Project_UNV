name: "استمارة تقديم مشروع/تقرير جامعي"
description: "استخدم هذا النموذج لرفع بيانات مشروعك والتقرير النهائي للجنة التحكيم."
title: "[تقديم مشروع]: "
labels: ["submission"]
body:
  - type: dropdown
    id: level
    attributes:
      label: "مستوى المشروع"
      description: "اختر المستوى الدراسي الخاص بالمشروع."
      options:
        - "فصلي"
        - "تخرج1"
        - "تخرج2"
    validations:
      required: true

  - type: input
    id: project_id
    attributes:
      label: "رقم المشروع"
      placeholder: "مثال: CS-2024-01"
    validations:
      required: true

  - type: input
    id: project_title
    attributes:
      label: "عنوان المشروع"
      placeholder: "أدخل الاسم الكامل للمشروع"
    validations:
      required: true

  - type: textarea
    id: students_names
    attributes:
      label: "أسماء الطلاب المشاركين في المشروع"
      placeholder: "اكتب أسماء جميع الطلاب (كل اسم في سطر)"
    validations:
      required: true

  - type: textarea
    id: supervisors_names
    attributes:
      label: "أسماء المشرفين على المشروع من الهيئة التدريسية"
      placeholder: "اكتب أسماء المشرفين"
    validations:
      required: true

  - type: textarea
    id: report_file
    attributes:
      label: "ملف التقرير الجامعي"
      description: "هام جداً: قم بسحب وإفلات ملف الـ PDF أو Word هنا ليتم توليد الرابط تلقائياً."
      placeholder: "اسحب الملف وضعه هنا..."
    validations:
      required: true
